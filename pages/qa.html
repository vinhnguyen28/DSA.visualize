<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSA Visualizer - Lộ trình học</title>
    <link rel="stylesheet" href="../assets/icons/css/all.min.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/modules/qa.css" />
  </head>
  <body>
    <div class="app-container">
      <nav class="navbar modern-navbar">
        <div class="nav-left">
          <a href="../index.html" class="brand-link">
            <div class="brand-logo">
              <i class="fa-solid fa-layer-group"></i>
            </div>
            <span class="brand-name"
              >DSA<span class="brand-highlight">.Visualizer</span></span
            >
          </a>
        </div>
        <div class="nav-right">
          <button class="btn-ghost">Log in</button>
          <button class="btn-gradient">Sign up</button>
          <div class="user-profile">
            <img
              src="https://ui-avatars.com/api/?name=Code+Ninja&background=0D8ABC&color=fff&bold=true"
              alt="User"
              class="avatar-img"
            />
          </div>
        </div>
      </nav>

      <div class="main-wrapper">
        <aside class="sidebar sidebar-compact">
          <div class="sidebar-menu">
            <a href="../index.html" class="sidebar-item">
              <i class="fa-solid fa-house"></i>
              <span>Trang chủ</span>
            </a>
            <a href="./roadmap.html" class="sidebar-item">
              <i class="fa-solid fa-road"></i>
              <span>Lộ trình</span>
            </a>
            <a href="./articles.html" class="sidebar-item">
              <i class="fa-solid fa-newspaper"></i>
              <span>Bài viết</span>
            </a>
            <a href="./qa.html" class="sidebar-item active">
              <i class="fa-solid fa-comments"></i>
              <span>Hỏi đáp</span>
            </a>
          </div>
        </aside>

        <main class="coming-soon-container">
          <div class="coming-soon-box">
            <div class="coming-soon-icon">
              <i class="fa-solid fa-hourglass-start pulse-animation"></i>
            </div>
            <h1 class="coming-soon-title">Hỏi & Đáp</h1>
            <p class="coming-soon-subtitle">
              Tính năng đang được phát triển. Hệ thống trực quan hóa lộ trình
              học thuật toán chuyên sâu sẽ sớm ra mắt!
            </p>
            <div class="coming-soon-status">
              <span class="status-tag"
                ><i class="fa-solid fa-screwdriver-wrench"></i> In
                Progress</span
              >
            </div>
            <a href="../index.html" class="btn-back-home">
              <i class="fa-solid fa-arrow-left"></i> Quay lại Trang chủ
            </a>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
