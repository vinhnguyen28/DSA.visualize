  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/animations.css" /> 
    <link rel="stylesheet" href="../css/components.css" /> 
    <link rel="stylesheet" href="../css/modules/pointer.css" /> 
  </head>
  
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/vs2015.min.css"
    />
    <link rel="stylesheet" href="../assets/icons/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/cpp.min.js"></script>
  </head>

  <body>
    <div class="app-container">
      <nav class="navbar">
        <div class="nav-left">
          <a href="../index.html" class="nav-left logo-link">
            <div class="logo-box">
              <!-- <i class="fa-solid fa-microchip"></i> -->
              <i
                class="fa-brands fa-apple"
                style="color: rgb(255, 255, 255)"
              ></i>
            </div>
            <span class="website-name"
              >DSA<span style="color: var(--accent-blue)"
                >.Visualizer</span
              ></span
            >
          </a>
        </div>
        <div class="nav-right">
          <a href="../index.html" class="btn">Back to Home</a>
        </div>
      </nav>

      <div class="main-wrapper">
        <aside class="sidebar">
          <div class="sidebar-menu">
            <!-- <a href="../index.html" class="sidebar-item">
              <i class="fa-solid fa-house"></i>
              Home
            </a> -->

            <!-- <div class="menu-item sidebar-item">Pointer</div> -->
            <div class="menu-item open">
              <div class="sidebar-item menu-header menu-header-pointer">
                1. Pointer
                <i class="fa-solid fa-chevron-down arrow"></i>
              </div>

              <div class="child-menu">
                <!-- lesstion 1.1 -->
                <a
                  href="#"
                  class="sidebar-item lesson-btn active"
                  id="btn-pointer"
                >
                  1.1 Pointer Declaration
                </a>

                <!-- lesstion 1.2 -->
                <a
                  href="#"
                  class="sidebar-item lesson-btn"
                  id="btn-AddressOperator"
                >
                  1.2 Address Operator
                </a>

                <!-- lesstion 1.3 -->
                <a
                  href="#"
                  class="sidebar-item lesson-btn"
                  id="btn-Dereference"
                >
                  1.3 Dereference
                </a>

                <!-- lesstion 1.4 -->
                <a
                  href="#"
                  class="sidebar-item lesson-btn"
                  id="btn-PointerAssignment"
                >
                  1.4 Pointer Assignment
                </a>

                <!-- lesstion 1.5 -->
                <a
                  href="#"
                  class="sidebar-item lesson-btn"
                  id="btn-NullPointer"
                >
                  1.5 Null Pointer
                </a>

                <!-- lesstion 1.6 -->
                <a
                  href="#"
                  class="sidebar-item lesson-btn"
                  id="btn-PointertoPointer"
                >
                  1.6 Pointer to Pointer
                </a>
              </div>
            </div>

            <div class="menu-item">
              <div class="sidebar-item menu-header menu-header-pointer">
                2. Dynamic Memory
                <i class="fa-solid fa-chevron-down arrow"></i>
              </div>

              <div class="child-menu">
                <a href="#" class="sidebar-item lesson-btn" id="btn-new">
                  2.1 new
                </a>

                <a href="#" class="sidebar-item lesson-btn" id="btn-delete">
                  2.2 delete
                </a>

                <a href="#" class="sidebar-item lesson-btn" id="btn-MemoryLeak">
                  2.3 Memory Leak
                </a>

                <a
                  href="#"
                  class="sidebar-item lesson-btn"
                  id="btn-DanglingPointer"
                >
                  2.4 Dangling Pointer
                </a>
              </div>
            </div>

            <!-- <a href="#" class="sidebar-item active" id="btn-pointer">
              + Con trỏ cơ bản
            </a>
            <a href="#" class="sidebar-item" id="btn-dynamic">
              + Cấp phát động
            </a> -->
          </div>
        </aside>

        <main class="workspace-wrapper">
          <div class="panels-container">
            <!-- phần hiển thị code, trạng thái chạy-->
            <div class="code-panel">
              <h3>Code</h3>

              <div id="current-line-info">Current Line: 1</div>
              <br />
              <br />
              <div class="code-block" id="code-container"></div>
            </div>

            <!-- Phần mô phỏng trên bộ nhớ -->
            <div class="viz-panel" id="viz-container"></div>

            <!-- Hiển thị chú thích từng bước -->
            <div class="explain-panel">
              <h3>Explanation</h3>
              <br />
              <div id="explanation-container"></div>
            </div>
          </div>

          <div class="control-panel">
            <button id="btn-reset" class="control-btn">Reset</button>
            <button id="btn-play-pause" class="control-btn btn-primary">
              Play
            </button>
            <!-- hiển thị tiến độ của code -->
            <span
              id="step-indicator"
              style="
                color: white;
                font-weight: bold;
                min-width: 80px;
                text-align: center;
              "
              >1 / 1</span
            >

            <button id="btn-prev" class="control-btn">Previous</button>
            <button id="btn-next" class="control-btn">Next</button>
          </div>
        </main>
      </div>
    </div>

    <script src="../js/core/arrows.js"></script>
    <script src="../js/core/BaseRenderer.js"></script>
    <script src="../js/core/controller.js"></script>

    <script src="../js/modules/pointer/pointer-data.js"></script>
    <script src="../js/modules/pointer/pointer-render.js"></script>
    <script src="../js/modules/pointer/pointer-control.js"></script>
